<!DOCTYPE html>
<html>
    <head>
        <meta http-equiv="content-type" content="text/html; charset=utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="stylesheet" href="css/style.css">
        <script src="jquery-3.6.3.js" type="text/javascript"></script>
        <script src="js/calculator.js" type="text/javascript"></script>
        <script>
            $(function(){
                $(".temp").hide();
                $(".time").hide();
                $(".len").hide();
                $(".con").click(function(){
                    $(".temp").slideToggle(500);
                    $(".time").slideToggle(500);
                    $(".len").slideToggle(500);
                });
            });
        </script>
        <title>Calculator</title>
    </head>
    <body>
        <nav> 
            <p class="con">Converter</p>
            <p class="temp"><a href="pages/tempconverter.html">Temperature</a></p>
            <p class="time"><a href="pages/timeconverter.html">Time</a></p>
            <p class="len"><a href="pages/lengthconverter.html">Length</a></p>
        </nav>
        <form name="ans">
            <input type="text" id="num" name="result">
            <table border="1">
                <tr>
                <td class="operator" id="squ">x²</td>
                <td class="operator" id="root">√x</td>
                <td class="operator" id="per">%</td>
                <td class="operator" id="fac">!</td>
                <td class="clear" id="clear">C</td>
            </tr>
            <tr>
                <td class="operator" id="cu">x³</td>
                <td class="operator" id="curoot">∛</td>
                <td id="se">7</td>
                <td id="ei">8</td>
                <td id="ni">9</td> 
            </tr>
            <tr>
                <td class="operator" id="div">÷</td>
                <td class="operator" id="mul">×</td>
                <td id="fou">4</td>
                <td id="fiv">5</td>
                <td id="si">6</td> 
            </tr>
            <tr>
                <td class="operator" id="mi">-</td>
                <td class="operator" id="pl">+</td>
                <td id="on">1</td>
                <td id="tw">2</td>
                <td id="th">3</td> 
            </tr>
            <tr>
                <td class="operator" id="bro">(</td> 
                <td class="operator" id="brc">)</td>
                <td id="do">.</td> 
                <td id="ze">0</td>
                <td class="equals" id="eq">=</td>
            </tr>
            </table>
        </form>
        <button><a href="pages/trig.html">SIN, COS...</a></button>
    </body>
</html>
