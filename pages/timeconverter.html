<!DOCTYPE html>
<html>
    <head>
        <meta http-equiv="content-type" content="text/html;charset=UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Time Converter</title>
        <link rel="stylesheet" href="../css/style.css">
        <script src="../js/timeconverter.js"></script>
    </head>
    <body>
        <nav>
            <p><a href="../index.html">&#8592; Back</a></p>
        </nav>
        <h1>Unit Converter</h1>
        <form>
            <p>Time</p>
            <label for="sec">Seconds</label><br>
            <input type="number" id="sec"><br><br>
            <label for="min">Minute</label><br>
            <input type="number" id="min"><br><br>
            <label for="hr">Hour</label><br>
            <input type="number" id="hr"><br><br>
            <label for="day">Day</label><br>
            <input type="number" id="day"><br><br>
            <label for="week">Week</label><br>
            <input type="number" id="week"><br><br>
            <label for="mth">Month</label><br>
            <input type="number" id="mth"><br><br>
            <label for="year">Year</label><br>
            <input type="number" id="year"><br><br>
        </form>
    </body>
</html>
