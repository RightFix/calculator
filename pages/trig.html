<!DOCTYPE html>
<html>
    <head>
        <meta http-equiv="content-type" content="text/html; charset=utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Trigonometric Calculator</title>
        <link rel="stylesheet" href="../css/style.css">
        <script src="../js/trig.js"></script>
    </head>
    <body>
        <nav>
            <p><a href="../index.html">&#8592; Back</a></p>
        </nav>
        <form name="ans">
            <input type="text" id="num" name="result">
            <table border="1">
            <tr>
                <td class="operator" id="sine">sin</td>
                <td class="operator" id="asin">sin⁻¹</td>
                <td id="bro">(</td>
                <td id="brc">)</td>
                <td class="clear" id="clear">C</td>
            </tr>
            <tr>
                <td class="operator" id="cos">cos</td>
                <td class="operator" id="acos">cos⁻¹</td> 
                <td id="se">7</td> 
                <td id="ei">8</td> 
                <td id="ni">9</td> 
            </tr>
            <tr>
                <td class="operator" id="tan">tan</td>
                <td class="operator" id="atan">tan⁻¹</td>
                <td id="fou">4</td> 
                <td id="fiv">5</td> 
                <td id="si">6</td> 
            </tr>
            <tr>
                <td class="operator" id="div">÷</td>
                <td class="operator" id="mul">×</td>
                <td id="on">1</td> 
                <td id="tw">2</td>
                <td id="th">3</td> 
            </tr>
            <tr>
                <td class="operator" id="mi">-</td> 
                <td class="operator" id="pl">+</td>
                <td id="do">.</td>
                <td id="ze">0</td>
                <td class="equals" id="eq">=</td>
            </tr>
            </table>
        </form>
    </body>
</html>
